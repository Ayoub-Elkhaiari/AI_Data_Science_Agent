services:
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - planner-service
      - profiling-service
      - cleaning-service
      - visualization-service
      - ml-advisor-service
      - report-service

  planner-service:
    build:
      context: .
      dockerfile: services/planner-service/Dockerfile
    env_file:
      - .env

  profiling-service:
    build:
      context: .
      dockerfile: services/profiling-service/Dockerfile
    volumes:
      - ./storage:/app/storage

  cleaning-service:
    build:
      context: .
      dockerfile: services/cleaning-service/Dockerfile
    volumes:
      - ./storage:/app/storage

  visualization-service:
    build:
      context: .
      dockerfile: services/visualization-service/Dockerfile
    volumes:
      - ./storage:/app/storage

  ml-advisor-service:
    build:
      context: .
      dockerfile: services/ml-advisor-service/Dockerfile

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    volumes:
      - ./storage:/app/storage